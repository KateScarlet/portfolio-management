# Air 配置文件
# 文档: https://github.com/air-verse/air

# 构建的根目录
root = "."

# 构建的临时目录
tmp_dir = "tmp"

[build]
  # 构建的命令
  cmd = "go build -o ./tmp/main ."
  # 构建的二进制文件
  bin = "./tmp/main"
  # 完整的跟踪监控目录
  include_ext = ["go", "tpl", "tmpl", "html", "sql"]
  # 忽略的目录
  exclude_dir = ["tmp", "vendor", "node_modules", ".git", "web"]
  # 忽略的文件
  exclude_regex = ["_test\\.go$"]
  # 延迟毫秒数
  delay = 500

[color]
  # 构建中的颜色
  build = "yellow"
  # 主程序中的颜色
  main = "magenta"
  # 观察者中的颜色
  watcher = "cyan"
  # 系统日志中的颜色
  log = "white"

[log]
  # 显示日志时间
  time = false

[misc]
  # 清除 tmp 目录
  clean_on_exit = true
