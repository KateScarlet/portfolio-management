run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - gocritic
    - gofmt
    - goimports
    - gosec
    - misspell
    - nilerr
    - unconvert
    - unparam
    - whitespace

linters-settings:
  govet:
    enable:
      - shadow
  gosec:
    excludes:
      - G104  # Unhandled errors
  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - unparam
