version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - gocritic
    - gosec
    - misspell
    - nilerr
    - unconvert
    - unparam
    - whitespace
  settings:
    govet:
      enable:
        - shadow
    gosec:
      excludes:
        - G104
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - unparam

formatters:
  enable:
    - gofmt
    - goimports
